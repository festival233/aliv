<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <!-- Main gold gradient -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5D87A"/>
      <stop offset="18%"  stop-color="#FFE484"/>
      <stop offset="35%"  stop-color="#C9880C"/>
      <stop offset="50%"  stop-color="#F0C040"/>
      <stop offset="65%"  stop-color="#FFE484"/>
      <stop offset="80%"  stop-color="#C9880C"/>
      <stop offset="100%" stop-color="#9B6A00"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="40%"  stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Side bevel dark -->
    <linearGradient id="bevel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7A4A00" stop-opacity="0.8"/>
      <stop offset="30%"  stop-color="#C9880C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F0C040" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- 3D extrude effect: dark offset layers first -->
  <g opacity="0.5" transform="translate(4,6)">
    <text x="0" y="185" font-family="'Arial Black','Impact',sans-serif" font-size="195" font-weight="900" fill="#4A2D00" letter-spacing="-5">ALIV</text>
  </g>
  <g opacity="0.5" transform="translate(4,6)">
    <text x="490" y="185" font-family="'Arial Black','Impact',sans-serif" font-size="195" font-weight="900" fill="#4A2D00" letter-spacing="-5">FEST</text>
  </g>

  <!-- ALIV text -->
  <g filter="url(#shadow)">
    <text x="0" y="185" font-family="'Arial Black','Impact',sans-serif" font-size="195" font-weight="900"
          fill="url(#goldMain)" letter-spacing="-5">ALIV</text>
    <!-- shine overlay on ALIV -->
    <text x="0" y="185" font-family="'Arial Black','Impact',sans-serif" font-size="195" font-weight="900"
          fill="url(#shine)" letter-spacing="-5" opacity="0.6">ALIV</text>
  </g>

  <!-- FEST text -->
  <g filter="url(#shadow)">
    <text x="490" y="185" font-family="'Arial Black','Impact',sans-serif" font-size="195" font-weight="900"
          fill="url(#goldMain)" letter-spacing="-5">FEST</text>
    <!-- shine overlay on FEST -->
    <text x="490" y="185" font-family="'Arial Black','Impact',sans-serif" font-size="195" font-weight="900"
          fill="url(#shine)" letter-spacing="-5" opacity="0.6">FEST</text>
  </g>
</svg>
