<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 170" width="820" height="170">
  <defs>
    <!-- Realistic 3D metallic gold — bright center, dark edges like the photo -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"    stop-color="#C8880A"/>
      <stop offset="8%"    stop-color="#F5D050"/>
      <stop offset="18%"   stop-color="#FFE878"/>
      <stop offset="30%"   stop-color="#FFF0A0"/>
      <stop offset="42%"   stop-color="#FFE060"/>
      <stop offset="52%"   stop-color="#FFEE90"/>
      <stop offset="62%"   stop-color="#E8C030"/>
      <stop offset="72%"   stop-color="#B07800"/>
      <stop offset="82%"   stop-color="#D0A020"/>
      <stop offset="91%"   stop-color="#8A5800"/>
      <stop offset="100%"  stop-color="#5A3200"/>
    </linearGradient>
    <!-- Bright specular highlight (the white-gold sheen) -->
    <linearGradient id="g2" x1="5%" y1="0%" x2="25%" y2="80%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="#FFFDE0" stop-opacity="0.35"/>
      <stop offset="70%"  stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- 3D bevel side shadow -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3A1E00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3A1E00" stop-opacity="0"/>
    </linearGradient>
    <!-- Dark extrude -->
    <linearGradient id="gext" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#5A3200"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="ds" x="-8%" y="-8%" width="120%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- 3D extrude offset (dark) -->
  <g transform="translate(6,10)" opacity="0.55">
    <text x="4"   y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#gext)" letter-spacing="2">ALIV</text>
    <text x="430" y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#gext)" letter-spacing="2">FEST</text>
  </g>

  <!-- Side bevel accent (left edge darker) -->
  <g transform="translate(3,3)" opacity="0.4">
    <text x="4"   y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#g3)" letter-spacing="2">ALIV</text>
    <text x="430" y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#g3)" letter-spacing="2">FEST</text>
  </g>

  <!-- Main gold letters -->
  <g filter="url(#ds)">
    <text x="4"   y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#g1)" letter-spacing="2">ALIV</text>
    <text x="430" y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#g1)" letter-spacing="2">FEST</text>
  </g>

  <!-- Specular shine overlay (the bright white-gold band) -->
  <g opacity="0.65">
    <text x="4"   y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#g2)" letter-spacing="2">ALIV</text>
    <text x="430" y="142" font-family="Impact,'Arial Black',Arial,sans-serif" font-size="150" font-weight="900" fill="url(#g2)" letter-spacing="2">FEST</text>
  </g>
</svg>
